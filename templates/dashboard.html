<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SnapMyFood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-color: #ffc107;
        }

        body {
            background-color: #f4f7f9;
            font-family: 'Poppins', sans-serif;
        }

        .dashboard-header {
            background: var(--primary-gradient);
            color: white;
            padding: 60px 0;
            border-radius: 0 0 50px 50px;
            margin-bottom: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .capture-box {
            background: white;
            border: none;
            border-radius: 20px;
            padding: 30px;
            transition: all 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .capture-box:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important;
        }

        #video {
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
            background: #000;
            border: 5px solid #f8f9fa;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-action {
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-capture {
            background: var(--primary-gradient);
            border: none;
            color: white;
        }

        .btn-upload {
            background: #28a745;
            border: none;
            color: white;
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            background: #f8f9fa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #764ba2;
        }

        #canvas { display: none; }
        
        .upload-area {
            border: 2px dashed #dee2e6;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    {% include 'nav.html' %}

    <div class="dashboard-header text-center">
        <div class="container">
            <h1 class="display-5 fw-bold text-white">Snap. Analyze. Eat Healthy.</h1>
            <p class="lead opacity-75">Upload or capture a food image to get instant nutritional insights.</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row g-4">
            <div class="col-md-6">
                <div class="capture-box text-center shadow-sm">
                    <div class="icon-circle shadow-sm">
                        <i class="fas fa-camera fa-2x"></i>
                    </div>
                    <h4 class="fw-bold mb-3">Live AI Scanner</h4>
                    <div class="position-relative d-inline-block">
                        <video id="video" autoplay></video>
                    </div>
                    <div class="mt-4">
                        <button class="btn btn-action btn-capture shadow" onclick="captureImage()">
                            <i class="fas fa-bolt me-2"></i> Capture & Predict
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="capture-box text-center shadow-sm">
                    <div class="icon-circle shadow-sm">
                        <i class="fas fa-file-upload fa-2x"></i>
                    </div>
                    <h4 class="fw-bold mb-3">Upload from Gallery</h4>
                    <p class="text-muted mb-4">Select a saved image of your meal to identify.</p>
                    
                    <form action="/predict" method="POST" enctype="multipart/form-data">
                        <div class="upload-area">
                            <input type="file" name="file" class="form-control" accept="image/*" required>
                        </div>
                        <button type="submit" class="btn btn-action btn-upload shadow w-100">
                            <i class="fas fa-search me-2"></i> Identify Food
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <form id="cameraForm" action="/predict" method="POST">
        <input type="hidden" name="image_data" id="image_data">
    </form>

    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const imageInput = document.getElementById('image_data');
        const cameraForm = document.getElementById('cameraForm');

        // Access Camera
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { 
                console.error("Camera error:", err);
                // Simple feedback if camera is blocked
                document.querySelector('.capture-box').innerHTML += `<div class="alert alert-warning mt-2">Camera access denied. Please use the upload option.</div>`;
            });

        function captureImage() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            const dataUrl = canvas.toDataURL('image/jpeg');
            imageInput.value = dataUrl;
            cameraForm.submit();
        }
    </script>
</body>
</html>
