<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SnapMyFood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        :root {
            --primary-color: #ffc107;
            --secondary-color: #ff9800;
        }

        body {
            /* Animated Gradient Background */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            margin: auto;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        .brand-logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }

        .brand-logo span {
            color: var(--secondary-color);
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 20px;
            border: 2px solid #eee;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.25);
        }

        .btn-login {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: bold;
            color: #fff;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
        }

        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
            color: #fff;
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: #777;
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: #555;
            font-size: 0.9rem;
        }

        .footer-text a {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="glass-card">
        <div class="brand-logo">
            <i class="fas fa-utensils me-2"></i>Snap<span>MyFood</span>
        </div>
        <p class="text-center text-muted mb-4">Welcome back! Please login to your account.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert" style="border-radius: 12px;">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" id="loginForm">
    <div class="mb-4">
        <label class="form-label fw-bold">Username</label>
        <div class="input-group border rounded-3" style="background: #f9f9f9;">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" id="username" name="username" class="form-control bg-transparent border-0" placeholder="Enter username" required>
        </div>
    </div>

    <div class="mb-4">
        <label class="form-label fw-bold">Password</label>
        <div class="input-group border rounded-3" style="background: #f9f9f9;">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" id="password" name="password" class="form-control bg-transparent border-0" placeholder="••••••••" required>
        </div>
    </div>

    <button type="submit" class="btn btn-login w-100">Login to Dashboard</button>
</form>

        <div class="footer-text">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>
</div>
<script>document.getElementById('loginForm').onsubmit = function(e) {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();

    if (user === "" || pass === "") {
        e.preventDefault(); // Form submit hone se rokna
        alert("⚠️ Please enter both Username and Password!");
        return false;
    }
    
    // Optional: Agar aap aur professional popup chahte hain (Browser alert ki jagah)
    // toh aap SweetAlert use kar sakte hain:
    // swal("Error", "All fields are mandatory!", "error");
};
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
