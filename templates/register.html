<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SnapMyFood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        :root {
            --primary-color: #ffc107;
            --secondary-color: #ff9800;
        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .register-container {
            width: 100%;
            max-width: 450px;
            margin: auto;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 35px;
        }

        .brand-logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: #333;
            text-align: center;
            margin-bottom: 5px;
        }

        .brand-logo span { color: var(--secondary-color); }

        .form-label { font-weight: 600; font-size: 0.9rem; }

        .input-group {
            background: #f9f9f9;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #ddd;
            transition: 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 0.25rem rgba(255, 152, 0, 0.1);
        }

        .form-control {
            border: none;
            padding: 12px;
            background: transparent;
        }

        .form-control:focus {
            box-shadow: none;
            background: #fff;
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: #ff9800;
        }

        .btn-register {
            background: linear-gradient(90deg, #28a745, #218838);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: bold;
            color: #fff;
            margin-top: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.2);
        }

        .btn-register:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
            color: white;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .footer-text a {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="glass-card shadow-lg">
        <div class="brand-logo">
            <i class="fas fa-utensils me-2 text-warning"></i>Snap<span>MyFood</span>
        </div>
        <p class="text-center text-muted mb-4">Join our AI food community today!</p>

        <form method="POST" id="regForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" id="username" class="form-control" placeholder="Choose a username" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" name="email" id="email" class="form-control" placeholder="name@example.com" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <small class="text-muted" style="font-size: 0.75rem;">Min. 6 characters required.</small>
            </div>

            <button type="submit" class="btn btn-register w-100">Create Account</button>
        </form>

        <div class="footer-text">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('regForm').onsubmit = function(e) {
        const user = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value.trim();

        // Check for empty fields
        if (!user || !email || !pass) {
            e.preventDefault();
            alert("⚠️ Sabhi fields bharna zaroori hai!");
            return false;
        }

        // Check password length
        if (pass.length < 6) {
            e.preventDefault();
            alert("⚠️ Password kam se kam 6 characters ka hona chahiye!");
            return false;
        }
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
