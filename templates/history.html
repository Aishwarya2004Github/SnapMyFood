<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis History - SnapMyFood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        body {
            background-color: #f4f7f9;
            font-family: 'Poppins', sans-serif;
        }

        .history-header {
            background: linear-gradient(135deg, #1a1a1a 0%, #343a40 100%);
            color: white;
            padding: 40px 0;
            margin-bottom: 30px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .table-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: none;
        }

        .table thead {
            background-color: #f8f9fa;
            border-bottom: 2px solid #eee;
        }

        .table thead th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: #666;
            padding: 20px;
        }

        .table tbody td {
            padding: 20px;
            vertical-align: middle;
            color: #444;
        }

        .dish-badge {
            background: rgba(255, 193, 7, 0.1);
            color: #d39e00;
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: 600;
            display: inline-block;
        }

        .date-text {
            color: #888;
            font-size: 0.9rem;
        }

        .btn-back {
            background: #333;
            color: white;
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #000;
            color: white;
            transform: translateX(-5px);
        }

        .empty-state {
            padding: 60px;
            text-align: center;
        }

        .clickable-row {
        cursor: pointer;
        transition: background-color 0.2s;
    }
    .clickable-row:hover {
        background-color: rgba(255, 193, 7, 0.05) !important;
    }
    </style>
</head>
<body>
    {% include 'nav.html' %}

    <div class="history-header text-center">
        <div class="container">
            <h2 class="fw-bold"><i class="fas fa-history me-2"></i>Analysis History</h2>
            <p class="opacity-75">Review your previous food classification records</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="mb-3">
            <a href="/dashboard" class="btn btn-back border-0">
                <i class="fas fa-arrow-left me-2"></i> Back to Dashboard
            </a>
        </div>

        <div class="card table-container">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="text-center"># ID</th>
                            <th>Identified Dish</th>
                            <th>Date & Time</th>
                            <th class="text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody>
    {% if history %}
        {% for item in history %}
        <tr class="clickable-row" onclick="window.location.href='/view_result/{{ item.id }}';">
            <td class="text-center text-muted fw-bold">#{{ item.id }}</td>
            <td>
                <div class="dish-badge">
                    <i class="fas fa-utensils me-2"></i><a href="/view_result/{{ item.id }}">{{ item.dish_name }}</a>
                </div>
            </td>
            <td class="date-text">
                <i class="far fa-calendar-alt me-2"></i>{{ item.date }}
            </td>
            <td class="text-center">
                <span class="badge bg-success rounded-pill px-3 py-2">
                    <i class="fas fa-eye me-1"></i> View Details
                </span>
            </td>
        </tr>
        {% endfor %}
    {% else %}
        {% endif %}
</tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
